name: CD

on:
  push:
    branches: [main]

env:
  PROJECT_ID: devvault-b3fd84
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/devvault-b3fd84/devvault
  CLUSTER: devvault-cluster

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          install_components: gke-gcloud-auth-plugin

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push backend
        run: |
          docker build -t ${{ env.REGISTRY }}/backend:${{ github.sha }} \
                       -t ${{ env.REGISTRY }}/backend:latest \
                       ./backend
          docker push ${{ env.REGISTRY }}/backend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/backend:latest

      - name: Build & push frontend
        run: |
          docker build -t ${{ env.REGISTRY }}/frontend:${{ github.sha }} \
                       -t ${{ env.REGISTRY }}/frontend:latest \
                       ./frontend
          docker push ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/frontend:latest

      - name: Get GKE credentials
        env:
          USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER }} \
            --location ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }}

      - name: Deploy to GKE
        env:
          USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
        run: |
          kubectl apply -f k8s/namespace.yml

          kubectl create secret generic devvault-secrets \
            --namespace=devvault \
            --from-literal=DB_USERNAME=postgres \
            --from-literal=DB_PASSWORD=postgres \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            --from-literal=GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --from-literal=GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f k8s/postgres.yml
          kubectl apply -f k8s/backend.yml
          kubectl apply -f k8s/frontend.yml
          kubectl set image deployment/backend backend=${{ env.REGISTRY }}/backend:${{ github.sha }} -n devvault
          kubectl set image deployment/frontend frontend=${{ env.REGISTRY }}/frontend:${{ github.sha }} -n devvault
          kubectl rollout status deployment/backend -n devvault
          kubectl rollout status deployment/frontend -n devvault
