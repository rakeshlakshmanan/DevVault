services:
  postgres:
    image: postgres:16
    container_name: devvault-postgres
    environment:
      POSTGRES_DB: devvault
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5444:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: